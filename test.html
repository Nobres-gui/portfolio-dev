<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Snake Game Dark</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background: radial-gradient(circle at top, #1f2937, #0b0f19);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:'Poppins', sans-serif;
      overflow:hidden;
      color:white;
    }

    .game-container{
      background:#111827;
      padding:25px;
      border-radius:25px;
      box-shadow:
        0 0 25px rgba(0,0,0,0.7),
        0 0 50px rgba(34,197,94,0.15);
      text-align:center;
      border:2px solid rgba(255,255,255,0.05);
    }

    h1{
      margin-bottom:15px;
      font-size:32px;
      color:#22c55e;
      letter-spacing:2px;
      text-shadow:0 0 10px rgba(34,197,94,0.5);
    }

    #score{
      font-size:22px;
      margin-bottom:15px;
      font-weight:600;
      color:#f8fafc;
    }

    canvas{
      background:
        linear-gradient(
          rgba(255,255,255,0.03) 1px,
          transparent 1px
        ),
        linear-gradient(
          90deg,
          rgba(255,255,255,0.03) 1px,
          transparent 1px
        ),
        #0f172a;

      background-size:10px 10px;

      border:4px solid #22c55e;
      border-radius:18px;

      box-shadow:
        0 0 20px rgba(34,197,94,0.4),
        inset 0 0 20px rgba(255,255,255,0.03);
    }

    .buttons{
      margin-top:18px;
      display:flex;
      gap:10px;
      justify-content:center;
    }

    button{
      border:none;
      padding:12px 20px;
      border-radius:12px;
      cursor:pointer;
      font-weight:600;
      font-size:15px;
      transition:0.2s;
    }

    .restart-btn{
      background:#22c55e;
      color:#fff;
      box-shadow:0 0 15px rgba(34,197,94,0.4);
    }

    .restart-btn:hover{
      transform:translateY(-2px);
      background:#16a34a;
    }

    .reset-btn{
      background:#ef4444;
      color:white;
      box-shadow:0 0 15px rgba(239,68,68,0.3);
    }

    .reset-btn:hover{
      transform:translateY(-2px);
      background:#dc2626;
    }

    .game-over{
      color:#ef4444;
      margin-top:15px;
      font-size:18px;
      display:none;
      font-weight:700;
    }
  </style>
</head>

<body>

  <div class="game-container">
    <h1>SNAKE GAME</h1>

    <div id="score">Pontuação: 0</div>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div class="buttons">
      <button class="restart-btn" onclick="restartGame()">Reiniciar</button>
      <button class="reset-btn" onclick="resetScore()">Resetar Pontuação</button>
    </div>

    <div class="game-over" id="gameOver">
      💀 Você perdeu!
    </div>
  </div>

  <script>
    const GAME_SPEED = 90;

    const gameCanvas = document.getElementById("gameCanvas");
    const ctx = gameCanvas.getContext("2d");

    let snake;
    let dx;
    let dy;
    let foodX;
    let foodY;
    let score;
    let gameRunning = true;
    let changingDirection = false;

    function initializeGame() {
      snake = [
        {x: 200, y: 200},
        {x: 190, y: 200},
        {x: 180, y: 200},
        {x: 170, y: 200},
      ];

      dx = 10;
      dy = 0;

      score = 0;
      updateScore();

      document.getElementById("gameOver").style.display = "none";

      createFood();
      gameRunning = true;

      main();
    }

    function main() {
      if (!gameRunning) return;

      setTimeout(() => {

        changingDirection = false;

        clearCanvas();
        drawFood();
        advanceSnake();
        drawSnake();

        if (didGameEnd()) {
          gameRunning = false;

          document.getElementById("gameOver").style.display = "block";

          // RESET AUTOMÁTICO DA PONTUAÇÃO AO MORRER
          score = 0;
          updateScore();

          return;
        }

        main();

      }, GAME_SPEED);
    }

    function clearCanvas() {
      ctx.fillStyle = "#0f172a";
      ctx.fillRect(0, 0, gameCanvas.width, gameCanvas.height);
    }

    function drawSnake() {
      snake.forEach((part, index) => {
        
        // Cabeça diferenciada
        if(index === 0){
          ctx.fillStyle = "#4ade80";
        } else {
          ctx.fillStyle = "#22c55e";
        }

        ctx.shadowBlur = 12;
        ctx.shadowColor = "#22c55e";

        ctx.beginPath();
        ctx.roundRect(part.x, part.y, 10, 10, 4);
        ctx.fill();

        ctx.shadowBlur = 0;
      });
    }

    function advanceSnake() {
      const head = {
        x: snake[0].x + dx,
        y: snake[0].y + dy
      };

      snake.unshift(head);

      const didEatFood = snake[0].x === foodX && snake[0].y === foodY;

      if (didEatFood) {
        score += 10;
        updateScore();
        createFood();
      } else {
        snake.pop();
      }
    }

    function didGameEnd() {

      for (let i = 4; i < snake.length; i++) {
        if (
          snake[i].x === snake[0].x &&
          snake[i].y === snake[0].y
        ) {
          return true;
        }
      }

      const hitLeftWall = snake[0].x < 0;
      const hitRightWall = snake[0].x > gameCanvas.width - 10;
      const hitTopWall = snake[0].y < 0;
      const hitBottomWall = snake[0].y > gameCanvas.height - 10;

      return (
        hitLeftWall ||
        hitRightWall ||
        hitTopWall ||
        hitBottomWall
      );
    }

    function randomTen(min, max) {
      return Math.round((Math.random() * (max - min) + min) / 10) * 10;
    }

    function createFood() {

      foodX = randomTen(0, gameCanvas.width - 10);
      foodY = randomTen(0, gameCanvas.height - 10);

      snake.forEach(part => {
        const foodOnSnake =
          part.x === foodX &&
          part.y === foodY;

        if (foodOnSnake) {
          createFood();
        }
      });
    }

    function drawFood() {

      ctx.fillStyle = "#ef4444";

      ctx.shadowBlur = 15;
      ctx.shadowColor = "#ef4444";

      ctx.beginPath();
      ctx.arc(foodX + 5, foodY + 5, 5, 0, 2 * Math.PI);
      ctx.fill();

      ctx.shadowBlur = 0;
    }

    function changeDirection(event) {

      if (changingDirection) return;

      changingDirection = true;

      const LEFT_KEY = 37;
      const RIGHT_KEY = 39;
      const UP_KEY = 38;
      const DOWN_KEY = 40;

      const keyPressed = event.keyCode;

      const goingUp = dy === -10;
      const goingDown = dy === 10;
      const goingRight = dx === 10;
      const goingLeft = dx === -10;

      if (keyPressed === LEFT_KEY && !goingRight) {
        dx = -10;
        dy = 0;
      }

      if (keyPressed === UP_KEY && !goingDown) {
        dx = 0;
        dy = -10;
      }

      if (keyPressed === RIGHT_KEY && !goingLeft) {
        dx = 10;
        dy = 0;
      }

      if (keyPressed === DOWN_KEY && !goingUp) {
        dx = 0;
        dy = 10;
      }
    }

    function restartGame() {
      gameRunning = false;

      setTimeout(() => {
        initializeGame();
      }, 100);
    }

    function resetScore() {
      score = 0;
      updateScore();
    }

    function updateScore() {
      document.getElementById("score").innerHTML =
        `Pontuação: ${score}`;
    }

    document.addEventListener("keydown", changeDirection);

    initializeGame();
  </script>

</body>
</html>
